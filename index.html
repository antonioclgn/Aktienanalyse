<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aktienanalyse</title>
<style>
  /* Verhindert, dass mobile Browser die Schrift automatisch vergrößern (Font-Boosting) —
     sonst sieht die Seite am Handy „aufgebläht" aus. */
  html { -webkit-text-size-adjust: 100%; text-size-adjust: 100%; }
  body { margin: 0; }

  /* Auch auf schmalen Bildschirmen zweispaltig bleiben (Charts links, Leiste rechts) —
     nur die Leiste schmaler und ohne 300px-Mindestbreite, damit beide Spalten passen. */
  @media (max-width: 700px) {
    .sidebar {
      width: 42% !important;
      min-width: 0 !important;
    }
  }
</style>
</head>
<body>
  <div style="position: relative; display: flex; justify-content: flex-end; align-items: center; gap: 8px; padding: 6px 8px; border-bottom: 1px solid #eee;">
    <span id="notifications-status" style="font-size: 11px; color: #999;"></span>
    <button id="notifications-toggle" type="button" style="cursor: pointer; font-size: 13px;">
      🔔 Benachrichtigungen <span id="notifications-badge" style="display: none; background: #dc2626; color: white; border-radius: 8px; padding: 0 5px; font-size: 11px;"></span>
    </button>
    <div id="notifications-panel" style="display: none; position: absolute; top: 100%; right: 8px; width: 340px; max-height: 65vh; overflow-y: auto; background: white; border: 1px solid #ccc; box-shadow: 0 2px 6px rgba(0,0,0,0.15); z-index: 10;">
      <div style="display: flex; justify-content: space-between; align-items: center; padding: 6px 8px; border-bottom: 1px solid #eee; position: sticky; top: 0; background: white;">
        <strong style="font-size: 12px;">Benachrichtigungen</strong>
        <span>
          <button id="notifications-mark-read" type="button" title="Alle als gelesen markieren">Gelesen</button>
          <button id="notifications-clear" type="button" title="Alle löschen">Löschen</button>
        </span>
      </div>
      <ul id="notifications-list" style="list-style: none; margin: 0; padding: 0;"></ul>
    </div>
  </div>

  <div class="dashboard-layout" style="display: flex; align-items: flex-start;">
    <div style="flex: 1; min-width: 0; padding: 8px 16px 8px 8px; box-sizing: border-box;">

      <div style="position: relative; max-width: 400px;">
        <input id="symbol-search" type="text" placeholder="Aktie oder ETF suchen (z.B. MSCI World)" style="width: 100%; box-sizing: border-box;">
        <ul id="suggestions" style="list-style: none; margin: 0; padding: 0; position: absolute; width: 100%; background: white; border: 1px solid #ccc; display: none;"></ul>
      </div>
      <p>Ausgewählt: <span id="selected-instrument">iShares Core S&P 500 UCITS ETF USD (Acc) (SXR8.DE)</span>
        <button id="favorite-star" type="button" title="Zu Favoriten" style="background: none; border: none; cursor: pointer; font-size: 18px; line-height: 1; vertical-align: middle; padding: 0;">☆</button>
      </p>

      <div style="max-width: 600px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px;">
        <div id="range-buttons">
          <button type="button" data-range="1d">Tag</button>
          <button type="button" data-range="5d">Woche</button>
          <button type="button" data-range="1mo">Monat</button>
          <button type="button" data-range="1y">Jahr</button>
          <button type="button" data-range="5y">5 Jahre</button>
          <button type="button" data-range="10y">10 Jahre</button>
        </div>
        <div style="text-align: right;">
          <div id="range-change"></div>
          <div id="current-price" style="font-size: 11px; color: #666;"></div>
        </div>
      </div>
      <svg id="chart" viewBox="0 0 600 220" style="max-width: 600px; width: 100%; height: auto; display: block;"></svg>

      <!-- Indikator-Charts werden aus der Registry erzeugt (renderIndicatorChartSkeletons). -->
      <div id="indicator-charts"></div>
    </div>

    <aside class="sidebar" style="width: 28vw; min-width: 300px; box-sizing: border-box; border-left: 1px solid #ccc; padding: 8px; position: sticky; top: 0; height: 100vh; overflow-y: auto; display: flex; flex-direction: column;">
      <h2 style="font-size: 14px; margin-top: 0;">Favoriten</h2>
      <ul id="favorites-list" style="list-style: none; padding: 0; margin: 0;"></ul>
      <section class="bar-settings" style="margin-top: 16px; padding-top: 10px; border-top: 1px solid #ccc; min-height: 25vh; font-size: 12px;">
        <h2 style="font-size: 14px; margin: 0 0 8px;">Balken-Einstellungen</h2>
        <div style="color: #666; margin-bottom: 6px;">Aktivierte Indikatoren müssen gemeinsam ausschlagen. Gilt für alle Werte.</div>
        <div style="display: flex; gap: 4px; align-items: center; margin-bottom: 4px;">
          <select id="preset-select" style="flex: 1; min-width: 0;"></select>
          <button id="watch-preset" type="button" title="Diesen Filter überwachen (Favorit)" style="background: none; border: none; cursor: pointer; font-size: 16px; line-height: 1; padding: 0 2px;">☆</button>
          <button id="save-preset" type="button" title="Aktuelle Werte als Variante speichern">Speichern</button>
          <button id="delete-preset" type="button" title="Gewählte Variante löschen">×</button>
        </div>
        <div id="watch-ranges" style="color: #666; font-size: 11px; margin-bottom: 4px;">
          <div style="margin-bottom: 2px;">Überwachen in diesen Zeitfenstern:</div>
          <div style="display: flex; flex-wrap: wrap; gap: 2px 10px;">
            <label><input type="checkbox" data-watch-range="1d"> Tag</label>
            <label><input type="checkbox" data-watch-range="5d"> Woche</label>
            <label><input type="checkbox" data-watch-range="1mo"> Monat</label>
            <label><input type="checkbox" data-watch-range="1y"> Jahr</label>
            <label><input type="checkbox" data-watch-range="5y"> 5 Jahre</label>
            <label><input type="checkbox" data-watch-range="10y"> 10 Jahre</label>
          </div>
        </div>
        <div id="watched-filters" style="color: #666; font-size: 11px; margin-bottom: 8px;"></div>
        <!-- Einstellungen je Indikator werden aus der Registry erzeugt (renderIndicatorSettings). -->
        <div id="indicator-settings"></div>
      </section>
    </aside>
  </div>

    <script>
      const LAST_SYMBOL_KEY = 'aktienanalyse-last-symbol';
      let currentSymbol = localStorage.getItem(LAST_SYMBOL_KEY) || 'SXR8.DE';
      let currentRange = '1y';
      let sharedChartPadLeft = 30;
      // Zeitstempel des zuletzt geladenen Kurscharts, damit der Fear&Greed-Chart
      // (der aus /api/data getrennt geladen wird) sich auf dieselbe X-Achse legen kann.
      let lastChartTimestamps = null;
      let lastHighlightRanges = [];
      let lastChartData = null;
      const HIGHLIGHT_SETTINGS_KEY = 'aktienanalyse-highlight-settings'; // alt: je Symbol
      const ACTIVE_SETTINGS_KEY = 'aktienanalyse-highlight-active';
      const PRESETS_KEY = 'aktienanalyse-highlight-presets';
      const DEFAULT_PRESET_NAME = 'Standard';
      const CUSTOM_PRESET_LABEL = 'Eigene (ungespeichert)';
      // ---------------------------------------------------------------------
      // Indikator-Registry
      //
      // Jeder Indikator ist EIN Eintrag: Aktiv-Schalter, Standard-Werte, Einstellungs-
      // Felder, Chart-Optik und eine build()-Funktion, die pro Kerze Wert + Signal
      // liefert. Einstellungs-Panel, Charts, Kombinier-Logik und Defaults werden
      // generisch daraus erzeugt. Einen neuen Indikator fügt man hier (und
      // spiegelbildlich in server.py) hinzu — sonst nichts.
      //
      // Kompatibilität: neue Indikatoren sind per Default AUS. Alte Filter kennen den
      // Schalter nicht -> normalizeSettings füllt ihn mit "aus" -> er zählt nicht mit.
      // Bestehende Filter/Benachrichtigungen bleiben also unverändert.
      // ---------------------------------------------------------------------
      function sig(buy, sell) { return buy ? 'green' : (sell ? 'red' : null); }

      const INDICATORS = [
        {
          key: 'feargreed', enabledKey: 'useFearGreed', title: 'Fear & Greed Index',
          chartId: 'feargreed-chart', currentId: 'feargreed-current',
          defaults: { useFearGreed: true, fearGreedBuy: 25, fearGreedSell: 75 },
          settings: {
            toggleLabel: 'Fear & Greed berücksichtigen',
            hint: 'Standard: kaufen ≤ 25, verkaufen ≥ 75',
            rows: [{ fields: [
              { key: 'fearGreedBuy', before: 'kaufen ≤ ', min: 0, max: 100, step: 0.1 },
              { key: 'fearGreedSell', before: 'verkaufen ≥ ', min: 0, max: 100, step: 0.1 },
            ] }],
          },
          ready: () => fearGreedHistory.length > 0,
          build: (ctx, s) => {
            const series = ctx.timestamps.map(t => fearGreedScoreAt(t));
            return {
              series,
              signals: series.map(v => (v == null ? null : sig(v <= s.fearGreedBuy, v >= s.fearGreedSell))),
              chart: { fixedMin: 0, fixedMax: 100, color: 'goldenrod', formatValue: v => v.toFixed(0),
                       referenceLines: [s.fearGreedBuy, s.fearGreedSell] },
              // Der aktuelle F&G-Text (Score + Rating) wird aus /api/data gesetzt -> hier nicht überschreiben.
              currentText: undefined,
            };
          },
        },
        {
          key: 'smartdumb', enabledKey: 'useSmartDumb', title: 'Smart Money vs Dumb Money',
          chartId: 'smartdumb-chart', currentId: 'smartdumb-chart-current',
          defaults: { useSmartDumb: true, smartDumbBuy: 50, smartDumbSell: -50 },
          settings: {
            toggleLabel: 'Smart/Dumb Money berücksichtigen',
            hint: 'Spread = Smart minus Dumb. Standard: kaufen ≥ 50, verkaufen ≤ −50.',
            rows: [{ fields: [
              { key: 'smartDumbBuy', before: 'kaufen ≥ ', min: -100, max: 100, step: 1 },
              { key: 'smartDumbSell', before: 'verkaufen ≤ ', min: -100, max: 100, step: 1 },
            ] }],
          },
          ready: () => smartDumbHistory.length > 0,
          build: (ctx, s) => {
            const spread = ctx.timestamps.map(t => (smartDumbAt(t) || {}).spread ?? null);
            const latest = smartDumbAt(ctx.timestamps[ctx.timestamps.length - 1]);
            return {
              series: spread,
              signals: spread.map(v => (v == null ? null : sig(v >= s.smartDumbBuy, v <= s.smartDumbSell))),
              chart: { fixedMin: -100, fixedMax: 100, signedArea: true, color: '#888',
                       formatValue: v => `${v > 0 ? '+' : ''}${v.toFixed(0)}`,
                       referenceLines: [{ value: 0, stroke: '#ddd', dashed: false }, s.smartDumbBuy, s.smartDumbSell] },
              currentText: latest
                ? `Smart ${latest.smart.toFixed(0)} / Dumb ${latest.dumb.toFixed(0)}`
                  + ` (Spread ${latest.spread > 0 ? '+' : ''}${latest.spread.toFixed(0)})`
                : '',
            };
          },
        },
        {
          key: 'rsi', enabledKey: 'useRsi', title: 'RSI 14',
          chartId: 'rsi-chart', currentId: 'rsi-chart-current',
          defaults: { useRsi: true, rsiBuy: 30, rsiSell: 70 },
          settings: {
            toggleLabel: 'RSI berücksichtigen',
            hint: 'Standard: kaufen ≤ 30, verkaufen ≥ 70',
            rows: [{ fields: [
              { key: 'rsiBuy', before: 'kaufen ≤ ', step: 0.1 },
              { key: 'rsiSell', before: 'verkaufen ≥ ', step: 0.1 },
            ] }],
          },
          ready: () => true,
          build: (ctx, s) => {
            const lv = lastValue(ctx.rsi);
            return {
              series: ctx.rsi,
              signals: (ctx.rsi || []).map(v => (v == null ? null : sig(v <= s.rsiBuy, v >= s.rsiSell))),
              chart: { fixedMin: 0, fixedMax: 100, color: 'purple', formatValue: v => v.toFixed(0),
                       referenceLines: [s.rsiBuy, s.rsiSell] },
              currentText: lv != null ? lv.toFixed(1) : '',
            };
          },
        },
        {
          key: 'pma', enabledKey: 'usePma', title: 'Moving Average Deviation',
          chartId: 'price-ma-chart', currentId: 'price-ma-chart-current', titleId: 'price-ma-chart-title',
          defaults: { usePma: true, pmaStdMultiplier: 1, maDeviationWindow: 150 },
          settings: {
            toggleLabel: 'Moving-Average-Abweichung berücksichtigen',
            hint: 'Standard: 150-Tage-Durchschnitt, 1× Standardabweichung',
            rows: [
              { block: true, field: { key: 'maDeviationWindow', before: 'Durchschnitt über ', after: ' Handelstage',
                                      min: 5, max: 400, step: 5, serverSide: true } },
              { block: true, field: { key: 'pmaStdMultiplier', before: 'Bandabstand: ', after: ' × Standardabweichung',
                                      min: 0, step: 0.1 } },
            ],
          },
          ready: () => true,
          build: (ctx, s) => {
            const trend = computeTrendLine(ctx.priceVsMaPct);
            const distance = ctx.priceVsMaPctStd != null ? ctx.priceVsMaPctStd * s.pmaStdMultiplier : null;
            const upper = (trend && distance != null) ? trend.map(v => (v != null ? v + distance : null)) : null;
            const lower = (trend && distance != null) ? trend.map(v => (v != null ? v - distance : null)) : null;
            const overlays = [{ series: trend, color: '#ccc' }];
            if (upper) overlays.push({ series: upper, color: '#ccc' });
            if (lower) overlays.push({ series: lower, color: '#ccc' });
            const signals = (ctx.priceVsMaPct || []).map((v, i) =>
              (upper && lower && v != null && upper[i] != null && lower[i] != null)
                ? sig(v < lower[i], v > upper[i]) : null);
            const lastPma = lastValue(ctx.priceVsMaPct);
            const avg = ctx.priceVsMaPctAvg;
            return {
              series: ctx.priceVsMaPct,
              signals,
              chart: { color: 'teal', overlays, formatValue: pmaFormat },
              currentText: lastPma != null
                ? `${lastPma > 0 ? '+' : ''}${lastPma.toFixed(2)}%`
                  + (avg != null ? ` (Ø: ${avg > 0 ? '+' : ''}${avg.toFixed(2)}%)` : '')
                : '',
              titleText: `Moving Average Deviation (${ctx.maWindow} Tage)`,
            };
          },
        },
      ];

      // Alles Weitere aus der Registry abgeleitet — nicht von Hand pflegen.
      const DEFAULT_HIGHLIGHT_SETTINGS = Object.assign({}, ...INDICATORS.map(ind => ind.defaults));
      // Felder, die serverseitig gerechnet werden (Chart braucht dann neue Daten).
      const SERVER_SIDE_SETTINGS = new Set(
        INDICATORS.flatMap(ind => (ind.settings.rows || [])
          .flatMap(row => (row.block ? [row.field] : row.fields)))
          .filter(field => field.serverSide).map(field => field.key));
      let highlightSettings = { ...DEFAULT_HIGHLIGHT_SETTINGS };
      let highlightPresets = {};

      function readStored(key, fallback) {
        try {
          return JSON.parse(localStorage.getItem(key)) || fallback;
        } catch {
          return fallback;
        }
      }

      // Früher wurden die Einstellungen pro Symbol gespeichert. Beim ersten Start mit
      // der neuen (globalen) Variante werden die Werte des zuletzt gewählten Symbols
      // übernommen, damit niemand seine Einstellungen verliert.
      function migrateLegacySettings() {
        if (localStorage.getItem(ACTIVE_SETTINGS_KEY)) return;
        const perSymbol = readStored(HIGHLIGHT_SETTINGS_KEY, null);
        if (!perSymbol) return;
        const legacy = perSymbol[currentSymbol] || Object.values(perSymbol)[0];
        if (legacy) localStorage.setItem(ACTIVE_SETTINGS_KEY, JSON.stringify(legacy));
      }

      // Varianten, die vor der Einführung eines Reglers gespeichert wurden, enthalten
      // dessen Schlüssel nicht. Vor jedem Vergleich deshalb mit den Standardwerten
      // auffüllen — sonst gälte so eine Variante nie als "ausgewählt".
      function normalizeSettings(settings) {
        return { ...DEFAULT_HIGHLIGHT_SETTINGS, ...settings };
      }

      function sameSettings(a, b) {
        const left = normalizeSettings(a);
        const right = normalizeSettings(b);
        return Object.keys(DEFAULT_HIGHLIGHT_SETTINGS)
          .every(key => left[key] === right[key]);
      }

      // Name der Variante, die exakt den aktuellen Werten entspricht (sonst null).
      function matchingPresetName() {
        if (sameSettings(highlightSettings, DEFAULT_HIGHLIGHT_SETTINGS)) return DEFAULT_PRESET_NAME;
        return Object.keys(highlightPresets)
          .find(name => sameSettings(highlightSettings, highlightPresets[name])) || null;
      }

      function renderPresetOptions() {
        const select = document.getElementById('preset-select');
        const active = matchingPresetName();
        select.innerHTML = '';
        const names = [DEFAULT_PRESET_NAME, ...Object.keys(highlightPresets).sort()];
        if (!active) names.push(CUSTOM_PRESET_LABEL);
        names.forEach(name => {
          const option = document.createElement('option');
          option.value = name;
          option.textContent = name;
          select.appendChild(option);
        });
        select.value = active || CUSTOM_PRESET_LABEL;
        document.getElementById('delete-preset').disabled = !(active && highlightPresets[active]);
        updateWatchUi();
      }

      function applyHighlightSettings(settings) {
        const previous = highlightSettings;
        highlightSettings = normalizeSettings(settings);
        saveHighlightSettings();
        loadHighlightSettings();
        // Enthält die Variante ein anderes Durchschnittsfenster, reicht Neuzeichnen
        // nicht — die Daten dafür kommen vom Server.
        const needsReload = [...SERVER_SIDE_SETTINGS]
          .some(key => highlightSettings[key] !== previous[key]);
        if (lastChartData && !needsReload) {
          rerenderHighlightCharts();
        } else {
          loadChart(currentSymbol, currentRange);
        }
      }

      function saveCurrentAsPreset() {
        const suggestion = matchingPresetName() === DEFAULT_PRESET_NAME ? '' : (matchingPresetName() || '');
        const name = (prompt('Name der Variante:', suggestion) || '').trim();
        if (!name || name === DEFAULT_PRESET_NAME || name === CUSTOM_PRESET_LABEL) return;
        highlightPresets[name] = { ...highlightSettings };
        localStorage.setItem(PRESETS_KEY, JSON.stringify(highlightPresets));
        renderPresetOptions();
        // Wird eine überwachte Variante überschrieben, muss der Server die neuen
        // Schwellenwerte kennen.
        pushConfig();
      }

      function deleteSelectedPreset() {
        const name = document.getElementById('preset-select').value;
        if (!highlightPresets[name]) return;
        delete highlightPresets[name];
        localStorage.setItem(PRESETS_KEY, JSON.stringify(highlightPresets));
        // Die gelöschte Variante darf nicht als verwaiste Überwachung zurückbleiben.
        localStorage.setItem(WATCHED_FILTERS_KEY,
          JSON.stringify(loadWatchedFilters().filter(f => f.name !== name)));
        renderPresetOptions();
        pushConfig();
      }

      function loadHighlightSettings() {
        highlightPresets = readStored(PRESETS_KEY, {});
        highlightSettings = {
          ...DEFAULT_HIGHLIGHT_SETTINGS,
          ...readStored(ACTIVE_SETTINGS_KEY, {}),
        };

        // Generisch aus der Registry: alle Schalter und Zahlenfelder aus den Einstellungen füllen.
        document.querySelectorAll('#indicator-settings [data-toggle]').forEach(cb => {
          cb.checked = !!highlightSettings[cb.dataset.toggle];
        });
        document.querySelectorAll('#indicator-settings [data-setting]').forEach(inp => {
          inp.value = highlightSettings[inp.dataset.setting];
        });
        renderPresetOptions();
      }

      function saveHighlightSettings() {
        localStorage.setItem(ACTIVE_SETTINGS_KEY, JSON.stringify(highlightSettings));
      }

      function updateHighlightSetting(name, value) {
        highlightSettings[name] = value;
        saveHighlightSettings();
        renderPresetOptions();
        if (lastChartData && !SERVER_SIDE_SETTINGS.has(name)) {
          rerenderHighlightCharts();
        } else {
          loadChart(currentSymbol, currentRange);
        }
      }

      function bindNumberSetting(input, settingName) {
        let lastValue = input.value;
        let pollTimer = null;

        const applyValue = () => {
          if (input.value === lastValue) return;
          lastValue = input.value;
          const value = Number(input.value);
          if (Number.isFinite(value)) updateHighlightSetting(settingName, value);
        };
        const stopPolling = () => {
          if (pollTimer != null) {
            clearInterval(pollTimer);
            pollTimer = null;
          }
        };

        input.addEventListener('input', applyValue);
        input.addEventListener('pointerdown', () => {
          stopPolling();
          pollTimer = setInterval(applyValue, 50);
        });
        input.addEventListener('blur', stopPolling);
        window.addEventListener('pointerup', stopPolling);
      }

      // Ein Zahlenfeld (mit Text davor/danach) in ein <label> hängen.
      function appendSettingField(labelEl, field) {
        if (field.before) labelEl.appendChild(document.createTextNode(field.before));
        const input = document.createElement('input');
        input.type = 'number';
        input.dataset.setting = field.key;
        input.style.width = '52px';
        ['min', 'max', 'step'].forEach(attr => { if (field[attr] != null) input.setAttribute(attr, field[attr]); });
        labelEl.appendChild(input);
        if (field.after) labelEl.appendChild(document.createTextNode(field.after));
      }

      // Einstellungs-Panel komplett aus der Registry erzeugen: je Indikator ein
      // Schalter, ein Hinweis und seine Zahlenfelder. Danach die Felder verdrahten.
      function renderIndicatorSettings() {
        const container = document.getElementById('indicator-settings');
        container.innerHTML = '';
        INDICATORS.forEach(ind => {
          const cfg = ind.settings || {};
          const toggle = document.createElement('label');
          toggle.style.cssText = 'display: block; margin-bottom: 3px;';
          const cb = document.createElement('input');
          cb.type = 'checkbox';
          cb.dataset.toggle = ind.enabledKey;
          toggle.appendChild(cb);
          toggle.appendChild(document.createTextNode(' ' + (cfg.toggleLabel || ind.title)));
          container.appendChild(toggle);

          if (cfg.hint) {
            const hint = document.createElement('div');
            hint.style.cssText = 'color: #666; margin: 0 0 3px 22px; font-size: 11px;';
            hint.textContent = cfg.hint;
            container.appendChild(hint);
          }

          (cfg.rows || []).forEach(row => {
            if (row.block) {
              const label = document.createElement('label');
              label.style.cssText = 'display: block; margin: 0 0 7px 22px;';
              appendSettingField(label, row.field);
              container.appendChild(label);
            } else {
              const line = document.createElement('div');
              line.style.cssText = 'display: flex; flex-wrap: wrap; gap: 4px; align-items: center; margin: 0 0 7px 22px;';
              (row.fields || []).forEach(field => {
                const label = document.createElement('label');
                appendSettingField(label, field);
                line.appendChild(label);
              });
              container.appendChild(line);
            }
          });
        });

        container.querySelectorAll('[data-toggle]').forEach(cb => {
          cb.addEventListener('change', event => updateHighlightSetting(cb.dataset.toggle, event.target.checked));
        });
        container.querySelectorAll('[data-setting]').forEach(inp => bindNumberSetting(inp, inp.dataset.setting));
      }

      // Für jeden Indikator seinen Chart-Rahmen (Titel, Aktuell-Wert, leeres SVG) anlegen.
      function renderIndicatorChartSkeletons() {
        const container = document.getElementById('indicator-charts');
        container.innerHTML = '';
        const ns = 'http://www.w3.org/2000/svg';
        INDICATORS.forEach(ind => {
          const header = document.createElement('div');
          header.style.cssText = 'max-width: 600px; font-size: 11px; color: #666; margin-top: 10px; display: flex; justify-content: space-between;';
          const title = document.createElement('span');
          if (ind.titleId) title.id = ind.titleId;
          title.textContent = ind.title;
          const current = document.createElement('span');
          current.id = ind.currentId;
          header.appendChild(title);
          header.appendChild(current);
          const svg = document.createElementNS(ns, 'svg');
          svg.id = ind.chartId;
          svg.setAttribute('viewBox', '0 0 600 90');
          svg.style.cssText = 'max-width: 600px; width: 100%; height: auto; display: block;';
          container.appendChild(header);
          container.appendChild(svg);
        });
      }

      function formatTick(date, rangeKey) {
        switch (rangeKey) {
          case '1d':
            return date.toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit' });
          case '5d':
            return date.toLocaleDateString('de-DE', { weekday: 'short', day: '2-digit' });
          case '1mo':
            return date.toLocaleDateString('de-DE', { day: '2-digit', month: '2-digit' });
          case '5y':
          case '10y':
            return date.toLocaleDateString('de-DE', { year: 'numeric' });
          case '1y':
          default:
            return date.toLocaleDateString('de-DE', { month: 'short' });
        }
      }

      // Grobe Schätzung der Textbreite (kein exaktes Messen nötig, nur genug
      // Platz reservieren, damit lange Zahlen wie Bitcoin-Kurse nicht am linken Rand abgeschnitten werden).
      function estimateLabelWidth(text, fontSize) {
        return text.length * fontSize * 0.62;
      }

      function computeLeftPadding(min, max, formatValue, fontSize, minPadding) {
        const widest = Math.max(
          estimateLabelWidth(formatValue(min), fontSize),
          estimateLabelWidth(formatValue(max), fontSize)
        );
        return Math.max(minPadding, widest + 8);
      }

      // Balken werden für alle aktivierten Indikatoren gezeichnet, wenn sie
      // gleichzeitig in dieselbe Richtung ausschlagen.
      const HIGHLIGHT_STYLES = {
        green: { color: '#16a34a', opacity: 0.28, minWidth: 2.5 },
        red: { color: '#dc2626', opacity: 0.28, minWidth: 2.5 },
      };

      function renderHighlightRects(svg, ns, rects) {
        rects.forEach(r => {
          const style = HIGHLIGHT_STYLES[r.type] || { color: '#999', opacity: 0.12 };
          // Einzelne Trigger-Punkte (x1 == x2) wären sonst unsichtbar: auf die
          // Mindestbreite aufziehen und dabei um ihren Zeitpunkt herum zentrieren.
          const width = Math.max(Math.abs(r.x2 - r.x1), style.minWidth || 1);
          const center = (r.x1 + r.x2) / 2;
          const rect = document.createElementNS(ns, 'rect');
          rect.setAttribute('x', Math.min(Math.min(r.x1, r.x2), center - width / 2));
          rect.setAttribute('y', r.y);
          rect.setAttribute('width', width);
          rect.setAttribute('height', r.height);
          rect.setAttribute('fill', style.color);
          rect.setAttribute('opacity', String(style.opacity));
          svg.appendChild(rect);
        });
      }

      function renderYAxisLabels(svg, padLeft, padTop, plotHeight, min, max, formatValue) {
        const ns = 'http://www.w3.org/2000/svg';
        [[max, padTop], [min, padTop + plotHeight]].forEach(([value, y]) => {
          const label = document.createElementNS(ns, 'text');
          label.setAttribute('x', padLeft - 4);
          label.setAttribute('y', y + 3);
          label.setAttribute('font-size', '8');
          label.setAttribute('fill', '#aaa');
          label.setAttribute('text-anchor', 'end');
          label.textContent = formatValue(value);
          svg.appendChild(label);
        });
      }

      function renderChart(closes, timestamps, rangeKey, movingAverage, sharedPadLeft, highlightRanges) {
        const svg = document.getElementById('chart');
        svg.innerHTML = '';
        if (!closes || closes.length < 2) return;

        const width = 600, height = 220;
        const padRight = 10, padTop = 10, padBottom = 30;

        const min = Math.min(...closes);
        const max = Math.max(...closes);
        const range = (max - min) || 1;
        const formatValue = v => v.toFixed(2);
        const padLeft = sharedPadLeft != null ? sharedPadLeft : computeLeftPadding(min, max, formatValue, 8, 30);
        const plotWidth = width - padLeft - padRight;
        const plotHeight = height - padTop - padBottom;

        const xAt = i => padLeft + (i / (closes.length - 1)) * plotWidth;
        const yAt = v => padTop + plotHeight - ((v - min) / range) * plotHeight;

        const points = closes.map((v, i) => `${xAt(i)},${yAt(v)}`).join(' ');

        const ns = 'http://www.w3.org/2000/svg';

        if (highlightRanges && highlightRanges.length) {
          renderHighlightRects(svg, ns, highlightRanges.map(r => ({
            type: r.type, x1: xAt(r.startIndex), x2: xAt(r.endIndex), y: padTop, height: plotHeight,
          })));
        }

        const yAxis = document.createElementNS(ns, 'line');
        yAxis.setAttribute('x1', padLeft);
        yAxis.setAttribute('y1', padTop);
        yAxis.setAttribute('x2', padLeft);
        yAxis.setAttribute('y2', padTop + plotHeight);
        yAxis.setAttribute('stroke', 'black');
        svg.appendChild(yAxis);

        const xAxis = document.createElementNS(ns, 'line');
        xAxis.setAttribute('x1', padLeft);
        xAxis.setAttribute('y1', padTop + plotHeight);
        xAxis.setAttribute('x2', padLeft + plotWidth);
        xAxis.setAttribute('y2', padTop + plotHeight);
        xAxis.setAttribute('stroke', 'black');
        svg.appendChild(xAxis);

        renderYAxisLabels(svg, padLeft, padTop, plotHeight, min, max, formatValue);

        const polyline = document.createElementNS(ns, 'polyline');
        polyline.setAttribute('points', points);
        polyline.setAttribute('fill', 'none');
        polyline.setAttribute('stroke', 'steelblue');
        polyline.setAttribute('stroke-width', '2');
        svg.appendChild(polyline);

        if (movingAverage) {
          const maPoints = closes
            .map((_, i) => (movingAverage[i] != null ? `${xAt(i)},${yAt(movingAverage[i])}` : null))
            .filter(p => p !== null)
            .join(' ');
          if (maPoints) {
            const maLine = document.createElementNS(ns, 'polyline');
            maLine.setAttribute('points', maPoints);
            maLine.setAttribute('fill', 'none');
            maLine.setAttribute('stroke', 'orange');
            maLine.setAttribute('stroke-width', '2');
            svg.appendChild(maLine);
          }
        }

        if (timestamps && timestamps.length === closes.length) {
          const tickCount = Math.min(6, timestamps.length);
          for (let t = 0; t < tickCount; t++) {
            const i = Math.round((t / (tickCount - 1)) * (timestamps.length - 1));
            const label = document.createElementNS(ns, 'text');
            label.setAttribute('x', xAt(i));
            label.setAttribute('y', padTop + plotHeight + 16);
            label.setAttribute('font-size', '10');
            label.setAttribute('text-anchor', 'middle');
            label.textContent = formatTick(new Date(timestamps[i] * 1000), rangeKey);
            svg.appendChild(label);
          }
        }
      }

      let fearGreedHistory = [];

      // Letzten bekannten Fear&Greed-Wert zu einem Zeitpunkt finden (fearGreedHistory
      // ist aufsteigend nach Zeit sortiert -> Vorwärts-Auffüllen per Binärsuche).
      function fearGreedScoreAt(ts) {
        let lo = 0, hi = fearGreedHistory.length - 1, result = null;
        while (lo <= hi) {
          const mid = (lo + hi) >> 1;
          if (fearGreedHistory[mid].t <= ts) {
            result = fearGreedHistory[mid].score;
            lo = mid + 1;
          } else {
            hi = mid - 1;
          }
        }
        return result;
      }

      // Smart/Dumb Money kommt aus wöchentlichen CFTC-Daten und wird — wie Fear & Greed —
      // per Vorwärts-Auffüllen auf die (täglichen/stündlichen) Kurszeitpunkte gelegt.
      let smartDumbHistory = [];

      function smartDumbAt(ts) {
        let lo = 0, hi = smartDumbHistory.length - 1, result = null;
        while (lo <= hi) {
          const mid = (lo + hi) >> 1;
          if (smartDumbHistory[mid].t <= ts) {
            result = smartDumbHistory[mid];
            lo = mid + 1;
          } else {
            hi = mid - 1;
          }
        }
        return result;
      }

      // Baut für JEDEN Indikator Wert- und Signal-Reihe (plus Chart-/Text-Infos).
      // Nicht bereite Indikatoren (fehlende Daten) liefern null und zählen als "kein Signal".
      function buildIndicators(ctx, settings) {
        const built = {};
        INDICATORS.forEach(ind => { built[ind.key] = ind.ready() ? ind.build(ctx, settings) : null; });
        return built;
      }

      // Gemeinsames Signal an Balken i: nur wenn ALLE aktivierten Indikatoren dort in
      // dieselbe Richtung zeigen (sonst null). Dieselbe Regel wie die Überwachung im Server.
      function combinedSignalAt(built, i, settings) {
        const enabled = INDICATORS.filter(ind => settings[ind.enabledKey]);
        if (!enabled.length) return null;
        const at = ind => (built[ind.key] ? built[ind.key].signals[i] : null) || null;
        if (enabled.every(ind => at(ind) === 'green')) return 'green';
        if (enabled.every(ind => at(ind) === 'red')) return 'red';
        return null;
      }

      // Findet zusammenhängende Zeiträume, in denen gleichzeitig gilt:
      // grün = alle aktivierten Indikatoren zeigen ein Kaufsignal
      // rot  = alle aktivierten Indikatoren zeigen ein Verkaufssignal
      function computeHighlightRanges(built, timestamps, settings) {
        const types = timestamps.map((t, i) => combinedSignalAt(built, i, settings));

        const ranges = [];
        let start = 0, current = types.length ? types[0] : null;
        for (let i = 1; i <= types.length; i++) {
          const t = i < types.length ? types[i] : null;
          if (t !== current) {
            if (current != null) {
              ranges.push({
                type: current,
                startIndex: start,
                endIndex: i - 1,
                startTs: timestamps[start],
                endTs: timestamps[i - 1],
              });
            }
            current = t;
            start = i;
          }
        }
        return ranges;
      }

      // Kumulierter (laufender) Durchschnitt: result[i] = Durchschnitt von series[0..i].
      // Dadurch bewegt sich die Linie (statt starr zu sein) und landet am rechten
      // Rand exakt beim Gesamtdurchschnitt des Zeitraums (= derselbe Wert wie "Ø" im Text).
      // Lücken (null) zählen nicht mit — sonst zöge eine fehlende Stelle den
      // Durchschnitt gegen 0. Identisch zu cumulative_trend() in server.py, damit
      // Balken im Chart und Benachrichtigungen dieselbe Linie verwenden.
      function computeTrendLine(series) {
        if (!series) return null;
        const result = new Array(series.length).fill(null);
        let sum = 0, count = 0;
        for (let i = 0; i < series.length; i++) {
          if (series[i] != null) {
            sum += series[i];
            count += 1;
          }
          result[i] = count ? sum / count : null;
        }
        return result;
      }

      const pmaFormat = v => `${v > 0 ? '+' : ''}${v.toFixed(1)}%`;

      // Am rechten Rand ist ein einzelner (schmaler) Balken leicht zu übersehen.
      // Deshalb wird der aktuelle Wert jedes Indikators eingefärbt, sobald DIESER
      // Indikator gerade ausschlägt — bewusst einzeln und nicht nach dem gemeinsamen
      // Balken, damit sofort sichtbar ist, welcher Indikator das Signal verhindert.
      const CURRENT_VALUE_IDS = Object.fromEntries(INDICATORS.map(ind => [ind.key, ind.currentId]));

      function applyCurrentSignalColors(signals) {
        Object.keys(CURRENT_VALUE_IDS).forEach(key => {
          const el = document.getElementById(CURRENT_VALUE_IDS[key]);
          if (!el) return;
          const style = signals ? HIGHLIGHT_STYLES[signals[key]] : null;
          el.style.color = style ? style.color : '';
          el.style.fontWeight = style ? '700' : '';
        });
      }

      function rerenderHighlightCharts() {
        const data = lastChartData;
        if (!data) return;

        const ctx = {
          timestamps: data.timestamps, closes: data.closes, rsi: data.rsi,
          priceVsMaPct: data.priceVsMaPct, priceVsMaPctStd: data.priceVsMaPctStd,
          priceVsMaPctAvg: data.priceVsMaPctAvg, maWindow: data.maWindow,
        };
        const built = buildIndicators(ctx, highlightSettings);
        const highlightRanges = computeHighlightRanges(built, data.timestamps, highlightSettings);

        renderChart(data.closes, data.timestamps, currentRange, data.movingAverage, sharedChartPadLeft, highlightRanges);

        // Jeden Indikator-Chart aus seinem build()-Ergebnis zeichnen.
        INDICATORS.forEach(ind => {
          const b = built[ind.key];
          if (!b) return;
          renderIndicatorChart(ind.chartId, b.series, data.timestamps, currentRange,
            { ...b.chart, padLeft: sharedChartPadLeft, highlightRanges });
          if (ind.titleId && b.titleText != null) {
            document.getElementById(ind.titleId).textContent = b.titleText;
          }
          // currentText === undefined -> Text nicht anfassen (z.B. F&G kommt aus /api/data).
          if (b.currentText !== undefined) {
            document.getElementById(ind.currentId).textContent = b.currentText;
          }
        });

        // Aktuellen Wert je Indikator einfärben, wenn DIESER (aktivierte) Indikator ausschlägt.
        const lastIndex = data.timestamps.length - 1;
        const lastSignals = {};
        INDICATORS.forEach(ind => {
          const b = built[ind.key];
          lastSignals[ind.key] = (b && lastIndex >= 0 && highlightSettings[ind.enabledKey])
            ? b.signals[lastIndex] : null;
        });
        applyCurrentSignalColors(lastSignals);

        lastChartTimestamps = data.timestamps;
        lastHighlightRanges = highlightRanges;
      }

      function lastValue(series) {
        if (!series) return null;
        for (let i = series.length - 1; i >= 0; i--) {
          if (series[i] != null) return series[i];
        }
        return null;
      }

      function renderNoDataMessage(svg, width, height) {
        const ns = 'http://www.w3.org/2000/svg';
        const label = document.createElementNS(ns, 'text');
        label.setAttribute('x', width / 2);
        label.setAttribute('y', height / 2);
        label.setAttribute('font-size', '11');
        label.setAttribute('fill', '#999');
        label.setAttribute('text-anchor', 'middle');
        label.textContent = 'Nicht genug Historie verfügbar';
        svg.appendChild(label);
      }

      function renderIndicatorChart(svgId, series, timestamps, rangeKey, options = {}) {
        const svg = document.getElementById(svgId);
        svg.innerHTML = '';
        const width = 600, height = 90;
        if (!series || series.length < 2) {
          renderNoDataMessage(svg, width, height);
          return;
        }

        const values = series.filter(v => v != null);
        if (values.length < 2) {
          renderNoDataMessage(svg, width, height);
          return;
        }

        const padRight = 10, padTop = 6, padBottom = 18;

        const min = options.fixedMin != null ? options.fixedMin : Math.min(...values);
        const max = options.fixedMax != null ? options.fixedMax : Math.max(...values);
        const range = (max - min) || 1;
        const formatValue = options.formatValue || (v => v.toFixed(1));
        const padLeft = options.padLeft != null ? options.padLeft : computeLeftPadding(min, max, formatValue, 8, 30);
        const plotWidth = width - padLeft - padRight;
        const plotHeight = height - padTop - padBottom;

        // Standard: Punkte gleichmäßig nach Index verteilt (keine Lücken am Wochenende).
        // Nur wenn xMin/xMax explizit übergeben werden (z.B. Fear&Greed-Chart, der
        // mit dem Preis-Chart zeitlich ausgerichtet sein soll), wird nach echter Zeit positioniert.
        const useTimeScale = options.xMin != null && options.xMax != null;
        const xRange = useTimeScale ? ((options.xMax - options.xMin) || 1) : null;

        const xAt = i => useTimeScale
          ? padLeft + ((timestamps[i] - options.xMin) / xRange) * plotWidth
          : padLeft + (i / (series.length - 1)) * plotWidth;
        const yAt = v => padTop + plotHeight - ((v - min) / range) * plotHeight;

        const ns = 'http://www.w3.org/2000/svg';

        if (options.highlightRanges && options.highlightRanges.length) {
          const xAtTime = ts => padLeft + ((ts - options.xMin) / xRange) * plotWidth;
          renderHighlightRects(svg, ns, options.highlightRanges.map(r => ({
            type: r.type,
            x1: useTimeScale ? xAtTime(r.startTs) : xAt(r.startIndex),
            x2: useTimeScale ? xAtTime(r.endTs) : xAt(r.endIndex),
            y: padTop,
            height: plotHeight,
          })));
        }

        const yAxis = document.createElementNS(ns, 'line');
        yAxis.setAttribute('x1', padLeft);
        yAxis.setAttribute('y1', padTop);
        yAxis.setAttribute('x2', padLeft);
        yAxis.setAttribute('y2', padTop + plotHeight);
        yAxis.setAttribute('stroke', 'black');
        svg.appendChild(yAxis);

        const xAxis = document.createElementNS(ns, 'line');
        xAxis.setAttribute('x1', padLeft);
        xAxis.setAttribute('y1', padTop + plotHeight);
        xAxis.setAttribute('x2', padLeft + plotWidth);
        xAxis.setAttribute('y2', padTop + plotHeight);
        xAxis.setAttribute('stroke', 'black');
        svg.appendChild(xAxis);

        renderYAxisLabels(svg, padLeft, padTop, plotHeight, min, max, formatValue);

        // Fläche zwischen Linie und Nulllinie, eingefärbt nach Vorzeichen. Umgesetzt als
        // dicht aneinanderliegende Rechtecke statt als Polygon — das spart das Berechnen
        // der Nulldurchgänge und sieht bei den hier üblichen Punktdichten identisch aus.
        // Wird vor den Schwellenlinien gezeichnet, damit die scharf darüber liegen.
        if (options.signedArea) {
          const zeroY = yAt(Math.min(Math.max(0, min), max));
          const step = plotWidth / Math.max(series.length - 1, 1);
          // Die Rechtecke selbst sind deckend und liegen pro Farbe in einer Gruppe, die
          // als Ganzes transparent gestellt wird. Würde jedes Rechteck einzeln
          // transparent gezeichnet, addierte sich die Deckkraft an den Überlappungen
          // zu sichtbaren senkrechten Streifen.
          const groups = {};
          ['#16a34a', '#dc2626'].forEach(color => {
            const group = document.createElementNS(ns, 'g');
            group.setAttribute('opacity', '0.18');
            groups[color] = group;
            svg.appendChild(group);
          });
          series.forEach((v, i) => {
            if (v == null) return;
            const y = yAt(v);
            const area = document.createElementNS(ns, 'rect');
            area.setAttribute('x', xAt(i) - step / 2);
            area.setAttribute('y', Math.min(y, zeroY));
            // Leichte Überbreite, damit zwischen den Rechtecken keine hellen Nähte entstehen.
            area.setAttribute('width', step + 0.5);
            area.setAttribute('height', Math.abs(zeroY - y));
            area.setAttribute('fill', v >= 0 ? '#16a34a' : '#dc2626');
            groups[v >= 0 ? '#16a34a' : '#dc2626'].appendChild(area);
          });
        }

        (options.referenceLines || []).forEach(ref => {
          const refValue = typeof ref === 'object' ? ref.value : ref;
          const stroke = typeof ref === 'object' && ref.stroke ? ref.stroke : '#ccc';
          const dashed = !(typeof ref === 'object' && ref.dashed === false);
          if (refValue < min || refValue > max) return;
          const line = document.createElementNS(ns, 'line');
          line.setAttribute('x1', padLeft);
          line.setAttribute('y1', yAt(refValue));
          line.setAttribute('x2', padLeft + plotWidth);
          line.setAttribute('y2', yAt(refValue));
          line.setAttribute('stroke', stroke);
          line.setAttribute('stroke-width', '1.5');
          if (dashed) line.setAttribute('stroke-dasharray', '5,3');
          svg.appendChild(line);
        });

        const points = series
          .map((v, i) => (v != null ? `${xAt(i)},${yAt(v)}` : null))
          .filter(p => p !== null)
          .join(' ');

        const polyline = document.createElementNS(ns, 'polyline');
        polyline.setAttribute('points', points);
        polyline.setAttribute('fill', 'none');
        polyline.setAttribute('stroke', options.color || 'steelblue');
        polyline.setAttribute('stroke-width', '2');
        svg.appendChild(polyline);

        (options.overlays || []).forEach(overlay => {
          const overlayPoints = overlay.series
            .map((v, i) => (v != null ? `${xAt(i)},${yAt(v)}` : null))
            .filter(p => p !== null)
            .join(' ');
          if (!overlayPoints) return;
          const overlayLine = document.createElementNS(ns, 'polyline');
          overlayLine.setAttribute('points', overlayPoints);
          overlayLine.setAttribute('fill', 'none');
          overlayLine.setAttribute('stroke', overlay.color || '#ccc');
          overlayLine.setAttribute('stroke-width', '1.5');
          if (overlay.dashed !== false) overlayLine.setAttribute('stroke-dasharray', '5,3');
          svg.appendChild(overlayLine);
        });

        if (timestamps && timestamps.length === series.length) {
          if (useTimeScale) {
            const tickCount = 6;
            for (let t = 0; t < tickCount; t++) {
              const time = options.xMin + (t / (tickCount - 1)) * xRange;
              const label = document.createElementNS(ns, 'text');
              label.setAttribute('x', padLeft + ((time - options.xMin) / xRange) * plotWidth);
              label.setAttribute('y', padTop + plotHeight + 13);
              label.setAttribute('font-size', '9');
              label.setAttribute('text-anchor', 'middle');
              label.textContent = formatTick(new Date(time * 1000), rangeKey);
              svg.appendChild(label);
            }
          } else {
            const tickCount = Math.min(6, timestamps.length);
            for (let t = 0; t < tickCount; t++) {
              const i = Math.round((t / (tickCount - 1)) * (timestamps.length - 1));
              const label = document.createElementNS(ns, 'text');
              label.setAttribute('x', xAt(i));
              label.setAttribute('y', padTop + plotHeight + 13);
              label.setAttribute('font-size', '9');
              label.setAttribute('text-anchor', 'middle');
              label.textContent = formatTick(new Date(timestamps[i] * 1000), rangeKey);
              svg.appendChild(label);
            }
          }
        }
      }

      async function loadChart(symbol, rangeKey) {
        try {
          const res = await fetch(`/api/history?symbol=${encodeURIComponent(symbol)}`
            + `&range=${encodeURIComponent(rangeKey)}`
            + `&maWindow=${encodeURIComponent(highlightSettings.maDeviationWindow)}`);
          const data = await res.json();
          if (data.error) throw new Error(data.error);
          lastChartData = data;

          // Gemeinsamer linker Rand für alle Charts auf der Seite, damit sie trotz
          // unterschiedlich breiter Y-Achsen-Zahlen (Kurs, RSI, %) an derselben Stelle beginnen.
          const priceValues = (data.closes || []).filter(v => v != null);
          const mainPadLeft = priceValues.length
            ? computeLeftPadding(Math.min(...priceValues), Math.max(...priceValues), v => v.toFixed(2), 8, 30)
            : 30;
          const pmaValues = (data.priceVsMaPct || []).filter(v => v != null);
          const pmaPadLeft = pmaValues.length
            ? computeLeftPadding(Math.min(...pmaValues), Math.max(...pmaValues), pmaFormat, 8, 30)
            : 30;
          const rsiPadLeft = computeLeftPadding(0, 100, v => v.toFixed(0), 8, 30);
          sharedChartPadLeft = Math.max(mainPadLeft, pmaPadLeft, rsiPadLeft);

          // Kauf-/Verkaufssignal-Zeiträume, Bänder und alle Charts: eine gemeinsame
          // Stelle, damit ein Neu-Rendern nach Einstellungsänderung identisch aussieht.
          rerenderHighlightCharts();

          const lastRsi = lastValue(data.rsi);
          document.getElementById('rsi-chart-current').textContent =
            lastRsi != null ? lastRsi.toFixed(1) : '';

          const lastPma = lastValue(data.priceVsMaPct);
          const avgPma = data.priceVsMaPctAvg;
          if (lastPma != null) {
            const current = `${lastPma > 0 ? '+' : ''}${lastPma.toFixed(2)}%`;
            const avgText = avgPma != null ? ` (Ø: ${avgPma > 0 ? '+' : ''}${avgPma.toFixed(2)}%)` : '';
            document.getElementById('price-ma-chart-current').textContent = current + avgText;
          } else {
            document.getElementById('price-ma-chart-current').textContent = '';
          }

          const closes = data.closes;
          const changeEl = document.getElementById('range-change');
          if (closes && closes.length >= 2) {
            const pct = ((closes[closes.length - 1] - closes[0]) / closes[0] * 100).toFixed(2);
            changeEl.textContent = `${pct > 0 ? '+' : ''}${pct}%`;
          } else {
            changeEl.textContent = 'n/a';
          }

          document.getElementById('current-price').textContent =
            closes && closes.length ? closes[closes.length - 1].toFixed(2) : '';
        } catch (err) {
          document.getElementById('range-change').textContent = 'Fehler';
          document.getElementById('current-price').textContent = '';
          console.error(err);
        }
      }

      async function loadData(symbol) {
        try {
          const res = await fetch(`/api/data?symbol=${encodeURIComponent(symbol)}`);
          const data = await res.json();
          if (data.error) throw new Error(data.error);

          const fg = data.fearGreed;
          document.getElementById('feargreed-current').textContent =
            `${fg.score.toFixed(1)} (${fg.rating})`;

          fearGreedHistory = fg.history || [];
          smartDumbHistory = (data.smartDumbMoney || {}).history || [];
          // Die Historie kann nach dem Kurschart eintreffen. Dann wurden die Balken
          // ohne Fear&Greed-Werte (= gar nicht) berechnet -> komplett neu rendern.
          if (lastChartData) {
            rerenderHighlightCharts();
          }

          document.getElementById('selected-instrument').textContent =
            `${data.market.name} (${data.market.symbol})`;

        } catch (err) {
          console.error(err);
        }
      }

      const searchInput = document.getElementById('symbol-search');
      const suggestionsList = document.getElementById('suggestions');
      let searchTimer = null;

      searchInput.addEventListener('input', () => {
        clearTimeout(searchTimer);
        const q = searchInput.value.trim();
        if (q.length < 2) {
          suggestionsList.style.display = 'none';
          return;
        }
        searchTimer = setTimeout(async () => {
          try {
            const res = await fetch(`/api/search?q=${encodeURIComponent(q)}`);
            const data = await res.json();
            const results = data.results || [];
            suggestionsList.innerHTML = '';
            results.forEach(r => {
              const li = document.createElement('li');
              li.textContent = `${r.name} — ${r.symbol} (${r.exchange}, ${r.type})`;
              li.style.padding = '4px 8px';
              li.style.cursor = 'pointer';
              li.addEventListener('click', () => {
                searchInput.value = '';
                suggestionsList.style.display = 'none';
                selectSymbol(r.symbol);
              });
              li.addEventListener('mouseenter', () => li.style.background = '#eee');
              li.addEventListener('mouseleave', () => li.style.background = 'white');
              suggestionsList.appendChild(li);
            });
            suggestionsList.style.display = results.length ? 'block' : 'none';
          } catch (err) {
            console.error(err);
          }
        }, 300);
      });

      document.addEventListener('click', (e) => {
        if (e.target !== searchInput) suggestionsList.style.display = 'none';
      });

      const rangeButtons = document.querySelectorAll('#range-buttons button');
      rangeButtons.forEach(btn => {
        if (btn.dataset.range === currentRange) btn.style.fontWeight = 'bold';
        btn.addEventListener('click', () => {
          currentRange = btn.dataset.range;
          rangeButtons.forEach(b => b.style.fontWeight = 'normal');
          btn.style.fontWeight = 'bold';
          loadChart(currentSymbol, currentRange);
        });
      });

      // Einstellungs-Panel + Indikator-Charts aus der Registry aufbauen (inkl. Verdrahtung).
      renderIndicatorSettings();
      renderIndicatorChartSkeletons();

      document.getElementById('preset-select').addEventListener('change', (event) => {
        const name = event.target.value;
        if (name === CUSTOM_PRESET_LABEL) return;
        applyHighlightSettings(
          name === DEFAULT_PRESET_NAME ? DEFAULT_HIGHLIGHT_SETTINGS : highlightPresets[name]
        );
      });

      document.getElementById('save-preset').addEventListener('click', saveCurrentAsPreset);
      document.getElementById('delete-preset').addEventListener('click', deleteSelectedPreset);

      const FAVORITES_KEY = 'aktienanalyse-favorites';

      function loadFavorites() {
        try {
          return JSON.parse(localStorage.getItem(FAVORITES_KEY)) || [];
        } catch {
          return [];
        }
      }

      function saveFavorites(favs) {
        localStorage.setItem(FAVORITES_KEY, JSON.stringify(favs));
      }

      function selectSymbol(symbol) {
        currentSymbol = symbol;
        localStorage.setItem(LAST_SYMBOL_KEY, symbol);
        // Einstellungen gelten global und bleiben beim Symbolwechsel unverändert.
        loadData(currentSymbol);
        loadChart(currentSymbol, currentRange);
        updateFavoriteStar();
      }

      function updateFavoriteStar() {
        const isFavorite = loadFavorites().some(f => f.symbol === currentSymbol);
        document.getElementById('favorite-star').textContent = isFavorite ? '★' : '☆';
      }

      function moveFavorite(index, direction) {
        const favs = loadFavorites();
        const target = index + direction;
        if (target < 0 || target >= favs.length) return;
        [favs[index], favs[target]] = [favs[target], favs[index]];
        saveFavorites(favs);
        renderFavorites();
        pushConfig();
      }

      function renderFavorites() {
        const list = document.getElementById('favorites-list');
        list.innerHTML = '';
        const favs = loadFavorites();
        favs.forEach((fav, index) => {
          const li = document.createElement('li');
          li.style.marginBottom = '6px';
          li.style.display = 'flex';
          li.style.justifyContent = 'space-between';
          li.style.alignItems = 'center';

          const link = document.createElement('a');
          link.href = '#';
          link.textContent = fav.name || fav.symbol;
          link.title = fav.symbol;
          link.style.cursor = 'pointer';
          link.style.fontSize = '13px';
          link.style.color = 'black';
          link.style.overflow = 'hidden';
          link.style.textOverflow = 'ellipsis';
          link.style.whiteSpace = 'nowrap';
          link.addEventListener('click', (e) => {
            e.preventDefault();
            selectSymbol(fav.symbol);
          });

          const actions = document.createElement('span');
          actions.style.display = 'flex';
          actions.style.flexShrink = '0';
          actions.style.marginLeft = '4px';

          const upBtn = document.createElement('button');
          upBtn.type = 'button';
          upBtn.textContent = '↑';
          upBtn.title = 'Nach oben';
          upBtn.disabled = index === 0;
          upBtn.style.marginLeft = '2px';
          upBtn.addEventListener('click', () => moveFavorite(index, -1));

          const downBtn = document.createElement('button');
          downBtn.type = 'button';
          downBtn.textContent = '↓';
          downBtn.title = 'Nach unten';
          downBtn.disabled = index === favs.length - 1;
          downBtn.style.marginLeft = '2px';
          downBtn.addEventListener('click', () => moveFavorite(index, 1));

          const removeBtn = document.createElement('button');
          removeBtn.type = 'button';
          removeBtn.textContent = '×';
          removeBtn.title = 'Entfernen';
          removeBtn.style.marginLeft = '2px';
          removeBtn.addEventListener('click', () => {
            saveFavorites(loadFavorites().filter(f => f.symbol !== fav.symbol));
            renderFavorites();
            updateFavoriteStar();
            pushConfig();
          });

          actions.appendChild(upBtn);
          actions.appendChild(downBtn);
          actions.appendChild(removeBtn);

          li.appendChild(link);
          li.appendChild(actions);
          list.appendChild(li);
        });
      }

      document.getElementById('favorite-star').addEventListener('click', () => {
        const favs = loadFavorites();
        const isFavorite = favs.some(f => f.symbol === currentSymbol);
        if (isFavorite) {
          saveFavorites(favs.filter(f => f.symbol !== currentSymbol));
        } else {
          const name = document.getElementById('selected-instrument').textContent
            .replace(` (${currentSymbol})`, '');
          favs.push({ symbol: currentSymbol, name });
          saveFavorites(favs);
        }
        renderFavorites();
        updateFavoriteStar();
        pushConfig();
      });

      // ---------------------------------------------------------------------
      // Überwachte Filter ("Favoriten-Filter") und Benachrichtigungen
      //
      // Ein als Favorit markierter Filter wird zusammen mit einem oder mehreren
      // Zeitfenstern (z.B. 5 Jahre UND 10 Jahre) und den Favoriten-Werten an den
      // Server gemeldet. Geprüft wird dort — auch bei geschlossenem Browser,
      // solange server.py läuft. Diese Seite zeigt nur an, was der Server fand.
      const WATCHED_FILTERS_KEY = 'aktienanalyse-watched-filters';
      const DEFAULT_ALERT_RANGE = '1y';
      const NOTIFICATION_POLL_MS = 60 * 1000;
      const SIGNAL_LABELS = { green: 'Kaufsignal', red: 'Verkaufssignal' };
      const RANGE_LABELS = {
        '1d': 'Tag', '5d': 'Woche', '1mo': 'Monat',
        '1y': 'Jahr', '5y': '5 Jahre', '10y': '10 Jahre',
      };
      let notifications = [];
      let serverInfo = { mailConfigured: false, intervalSeconds: 300 };

      function loadWatchedFilters() {
        const stored = readStored(WATCHED_FILTERS_KEY, []);
        if (!Array.isArray(stored)) return [];
        // Verwaiste Überwachungen entfernen: gibt es die Variante nicht mehr (gelöscht),
        // fällt ihr Eintrag hier heraus. Nur solange überhaupt Varianten bekannt sind —
        // sonst könnte ein Zwischenstand versehentlich alles verwerfen.
        const presets = readStored(PRESETS_KEY, {});
        const hasPresets = Object.keys(presets).length > 0;
        const known = name => name === DEFAULT_PRESET_NAME || !!presets[name];
        return stored
          .map(entry => {
            // Ältere Stände: nur Name (String) oder ein einzelnes Zeitfenster ({name, range}).
            if (typeof entry === 'string') return { name: entry, ranges: [DEFAULT_ALERT_RANGE] };
            if (!entry || !entry.name) return null;
            const ranges = Array.isArray(entry.ranges)
              ? entry.ranges
              : (entry.range ? [entry.range] : [DEFAULT_ALERT_RANGE]);
            return { name: entry.name, ranges };
          })
          .filter(entry => entry)
          .filter(entry => !hasPresets || known(entry.name))
          // Nur bekannte Zeitfenster behalten; ohne gültiges Fenster fällt der Filter raus.
          .map(entry => ({ name: entry.name, ranges: entry.ranges.filter(r => RANGE_LABELS[r]) }))
          .filter(entry => entry.ranges.length);
      }

      function saveWatchedFilters(entries) {
        localStorage.setItem(WATCHED_FILTERS_KEY, JSON.stringify(entries));
        updateWatchUi();
        pushConfig();
      }

      function filterSettingsByName(name) {
        if (name === DEFAULT_PRESET_NAME) return DEFAULT_HIGHLIGHT_SETTINGS;
        return highlightPresets[name] ? normalizeSettings(highlightPresets[name]) : null;
      }

      // Gelöschte Varianten fallen hier automatisch heraus.
      function watchedFilters() {
        return loadWatchedFilters()
          .map(entry => ({ ...entry, settings: filterSettingsByName(entry.name) }))
          .filter(entry => entry.settings);
      }

      function updateWatchUi() {
        const selected = document.getElementById('preset-select').value;
        const star = document.getElementById('watch-preset');
        const watched = loadWatchedFilters();
        const entry = watched.find(f => f.name === selected);
        // Ungespeicherte Werte haben keinen Namen, auf den sich eine Überwachung beziehen könnte.
        const disabled = selected === CUSTOM_PRESET_LABEL;
        star.disabled = disabled;
        star.style.opacity = disabled ? '0.35' : '1';
        star.textContent = entry ? '★' : '☆';

        const chosen = entry ? entry.ranges : [];
        document.querySelectorAll('#watch-ranges input[data-watch-range]').forEach(box => {
          box.checked = chosen.includes(box.dataset.watchRange);
          box.disabled = disabled;
        });

        const active = watchedFilters();
        document.getElementById('watched-filters').textContent = active.length
          ? 'Überwacht: ' + active
              .map(f => `${f.name} (${f.ranges.map(r => RANGE_LABELS[r]).join(', ')})`)
              .join('; ') + ' — für alle Favoriten'
          : 'Kein Filter überwacht (☆ markiert die Variante und wählt ein Zeitfenster).';
      }

      // Stern: schaltet die Überwachung ganz an oder aus. Beim Einschalten wird das
      // gerade angezeigte Zeitfenster vorbelegt, damit sofort etwas überwacht wird.
      function toggleWatchedFilter() {
        const name = document.getElementById('preset-select').value;
        if (name === CUSTOM_PRESET_LABEL || !filterSettingsByName(name)) return;
        const watched = loadWatchedFilters();
        if (watched.some(f => f.name === name)) {
          saveWatchedFilters(watched.filter(f => f.name !== name));
        } else {
          const preset = RANGE_LABELS[currentRange] ? currentRange : DEFAULT_ALERT_RANGE;
          saveWatchedFilters([...watched, { name, ranges: [preset] }]);
          requestCheck();
        }
      }

      // Einzelnes Zeitfenster für den gewählten Filter an-/abwählen. Wird das letzte
      // Fenster abgewählt, endet die Überwachung dieses Filters ganz.
      function toggleWatchRange(range, on) {
        const name = document.getElementById('preset-select').value;
        if (name === CUSTOM_PRESET_LABEL || !filterSettingsByName(name) || !RANGE_LABELS[range]) return;
        const watched = loadWatchedFilters();
        const entry = watched.find(f => f.name === name);
        let next;
        if (entry) {
          const ranges = on
            ? [...new Set([...entry.ranges, range])]
            : entry.ranges.filter(r => r !== range);
          next = ranges.length
            ? watched.map(f => (f.name === name ? { name, ranges } : f))
            : watched.filter(f => f.name !== name);
        } else if (on) {
          next = [...watched, { name, ranges: [range] }];
        } else {
          return;
        }
        saveWatchedFilters(next);
        if (on) requestCheck();
      }

      // Geräteübergreifende Synchronisation (Variante A): Der Server ist die Quelle
      // der Wahrheit für Favoriten, gespeicherte Varianten und überwachte Filter.
      // Bei jeder Änderung wird der gesamte Stand hochgeladen; daraus leitet der
      // Server auch die Watchlist für die Überwachung ab.
      async function pushConfig() {
        try {
          await fetch('/api/config', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              favorites: loadFavorites(),
              presets: readStored(PRESETS_KEY, {}),
              watched: loadWatchedFilters(),
            }),
          });
        } catch (err) {
          console.error(err);
        }
      }

      function configHasData(cfg) {
        return !!cfg && ((cfg.favorites && cfg.favorites.length)
          || (cfg.presets && Object.keys(cfg.presets).length)
          || (cfg.watched && cfg.watched.length));
      }

      // Beim Öffnen: Server-Stand in den localStorage spiegeln (Server gewinnt).
      // Ist am Server noch nichts gespeichert, wird der lokale Stand einmalig
      // hochgeladen — so „sät" das erste Gerät mit Daten die gemeinsame Config.
      async function pullConfig() {
        try {
          const cfg = await (await fetch('/api/config')).json();
          if (configHasData(cfg)) {
            if (Array.isArray(cfg.favorites)) localStorage.setItem(FAVORITES_KEY, JSON.stringify(cfg.favorites));
            if (cfg.presets && typeof cfg.presets === 'object') localStorage.setItem(PRESETS_KEY, JSON.stringify(cfg.presets));
            if (Array.isArray(cfg.watched)) localStorage.setItem(WATCHED_FILTERS_KEY, JSON.stringify(cfg.watched));
          } else {
            await pushConfig();
          }
        } catch (err) {
          // Server nicht erreichbar -> mit dem lokalen Stand weiterarbeiten.
          console.error(err);
        }
      }

      async function requestCheck() {
        try {
          await fetch('/api/alerts/check', { method: 'POST' });
        } catch (err) {
          console.error(err);
        }
        refreshNotifications();
      }

      async function refreshNotifications() {
        try {
          const res = await fetch('/api/alerts/notifications');
          const data = await res.json();
          notifications = Array.isArray(data.notifications) ? data.notifications : [];
          serverInfo = {
            mailConfigured: !!data.mailConfigured,
            intervalSeconds: data.intervalSeconds || serverInfo.intervalSeconds,
          };
          document.getElementById('notifications-status').textContent = '';
        } catch (err) {
          // Ohne laufenden Server gibt es keine Überwachung — das gehört sichtbar gemacht.
          document.getElementById('notifications-status').textContent = 'Server nicht erreichbar';
        }
        renderNotifications();
      }

      function formatNotificationTime(ts) {
        const date = new Date(ts);
        return `${date.toLocaleDateString('de-DE', { day: '2-digit', month: '2-digit' })} `
          + date.toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit' });
      }

      // Zeigt genau die Konstellation, die zur Benachrichtigung geführt hat:
      // Filter, Zeitraum und Wert.
      function showNotificationContext(entry) {
        const settings = filterSettingsByName(entry.filter);
        if (settings) {
          highlightSettings = normalizeSettings(settings);
          saveHighlightSettings();
          loadHighlightSettings();
        }
        if (RANGE_LABELS[entry.range]) {
          currentRange = entry.range;
          rangeButtons.forEach(b => {
            b.style.fontWeight = b.dataset.range === entry.range ? 'bold' : 'normal';
          });
        }
        selectSymbol(entry.symbol);
      }

      function renderNotifications() {
        const list = document.getElementById('notifications-list');
        list.innerHTML = '';

        if (!notifications.length) {
          const empty = document.createElement('li');
          empty.textContent = 'Noch keine Benachrichtigungen.';
          empty.style.cssText = 'padding: 10px 8px; font-size: 12px; color: #999;';
          list.appendChild(empty);
        }

        notifications.forEach(entry => {
          const li = document.createElement('li');
          li.style.cssText = 'padding: 6px 8px; border-bottom: 1px solid #eee; cursor: pointer; font-size: 12px;';
          if (!entry.read) li.style.background = '#f5f8ff';
          li.addEventListener('mouseenter', () => li.style.background = '#eee');
          li.addEventListener('mouseleave', () => li.style.background = entry.read ? '' : '#f5f8ff');
          li.addEventListener('click', () => {
            markNotificationsRead();
            showNotificationContext(entry);
            document.getElementById('notifications-panel').style.display = 'none';
          });

          const signalLabel = SIGNAL_LABELS[entry.type] || 'Signal';
          const headline = document.createElement('div');
          // Anhaltende Signale (Dauer-Meilenstein) heben sich ab: sie sind die stärkere Info.
          headline.textContent = entry.sustainedLabel
            ? `⏳ Anhaltendes ${signalLabel} (seit ${entry.sustainedLabel}): ${entry.name || entry.symbol}`
            : `${signalLabel}: ${entry.name || entry.symbol}`;
          headline.style.color = (HIGHLIGHT_STYLES[entry.type] || {}).color || '';
          headline.style.fontWeight = '700';

          const meta = document.createElement('div');
          meta.textContent = `Filter „${entry.filter}“ · ${RANGE_LABELS[entry.range] || entry.range}`
            + `-Chart · ${formatNotificationTime(entry.ts)}`;
          meta.style.cssText = 'color: #666; font-size: 11px;';

          li.appendChild(headline);
          li.appendChild(meta);
          list.appendChild(li);
        });

        const footer = document.createElement('li');
        footer.style.cssText = 'padding: 6px 8px; font-size: 11px; color: #999;';
        footer.textContent = `Der Server prüft alle ${Math.round(serverInfo.intervalSeconds / 60)}`
          + ' Minuten, auch bei geschlossenem Browser. '
          + (serverInfo.mailConfigured
            ? 'Mailversand ist eingerichtet.'
            : 'Mailversand: data/mail_config.json anlegen.');
        list.appendChild(footer);

        const unread = notifications.filter(e => !e.read).length;
        const badge = document.getElementById('notifications-badge');
        badge.textContent = unread;
        badge.style.display = unread ? 'inline-block' : 'none';
      }

      async function markNotificationsRead() {
        notifications = notifications.map(e => ({ ...e, read: true }));
        renderNotifications();
        try {
          await fetch('/api/alerts/notifications/read', { method: 'POST' });
        } catch (err) {
          console.error(err);
        }
      }

      document.getElementById('watch-preset').addEventListener('click', toggleWatchedFilter);
      document.querySelectorAll('#watch-ranges input[data-watch-range]').forEach(box => {
        box.addEventListener('change', (event) => {
          toggleWatchRange(event.target.dataset.watchRange, event.target.checked);
        });
      });

      document.getElementById('notifications-toggle').addEventListener('click', (event) => {
        event.stopPropagation();
        const panel = document.getElementById('notifications-panel');
        const opening = panel.style.display === 'none';
        panel.style.display = opening ? 'block' : 'none';
        if (opening) refreshNotifications();
      });

      document.getElementById('notifications-mark-read').addEventListener('click', markNotificationsRead);

      document.getElementById('notifications-clear').addEventListener('click', async () => {
        notifications = [];
        renderNotifications();
        try {
          await fetch('/api/alerts/notifications/clear', { method: 'POST' });
        } catch (err) {
          console.error(err);
        }
      });

      document.addEventListener('click', (event) => {
        const panel = document.getElementById('notifications-panel');
        if (!panel.contains(event.target)) panel.style.display = 'none';
      });

      // Start: erst den geräteübergreifenden Stand vom Server holen (Variante A),
      // danach die Oberfläche daraus aufbauen. So sieht jedes Gerät dasselbe.
      // Deep-Link aus der E-Mail: ?symbol=&range=&filter= wählt Asset, Zeitfenster und
      // Filter vor. Wird beim Start nach dem Laden der Varianten angewendet.
      function applyDeepLink() {
        const params = new URLSearchParams(location.search);
        const filter = params.get('filter');
        const range = params.get('range');
        const symbol = params.get('symbol');
        if (!filter && !range && !symbol) return;

        if (filter) {
          const settings = filterSettingsByName(filter);
          if (settings) {
            highlightSettings = normalizeSettings(settings);
            saveHighlightSettings();
            loadHighlightSettings();
          }
        }
        if (range && RANGE_LABELS[range]) {
          currentRange = range;
          rangeButtons.forEach(b => { b.style.fontWeight = b.dataset.range === range ? 'bold' : 'normal'; });
        }
        if (symbol) {
          currentSymbol = symbol;
          localStorage.setItem(LAST_SYMBOL_KEY, symbol);
        }
        // URL säubern, damit ein manueller Reload die Auswahl nicht erneut erzwingt.
        history.replaceState(null, '', location.pathname);
      }

      (async function init() {
        migrateLegacySettings();
        await pullConfig();
        loadHighlightSettings();
        // Verwaiste Überwachungen (deren Variante gelöscht wurde) einmalig entfernen
        // und den bereinigten Stand zum Server zurückschreiben.
        const rawWatched = readStored(WATCHED_FILTERS_KEY, []);
        const cleanedWatched = loadWatchedFilters();
        if (Array.isArray(rawWatched) && rawWatched.length !== cleanedWatched.length) {
          saveWatchedFilters(cleanedWatched);
        }
        applyDeepLink();
        renderFavorites();
        updateFavoriteStar();
        refreshNotifications();
        loadData(currentSymbol);
        loadChart(currentSymbol, currentRange);
        setInterval(refreshNotifications, NOTIFICATION_POLL_MS);
      })();
    </script>
</body>
</html>
